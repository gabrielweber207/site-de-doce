{% extends "base.html" %}

{% block title %}Cadastro{% endblock %}

{% block content %}
<div class="container container-xs">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <h2>Crie sua conta</h2>
            <p>Junte-se a nós para ter acesso a ofertas exclusivas.</p>
        </div>
        
        <form action="{{ url_for('auth.cadastro') }}" method="POST" class="auth-form" id="cadastroForm">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required minlength="3">
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">E-mail</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" name="senha" placeholder="Mínimo de 6 caracteres" required minlength="6">
                </div>
            </div>

            <div class="form-group">
                <label for="cpf">CPF</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="endereco">Endereço de Entrega</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro, Cidade" required>
                </div>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" id="aceito" required>
                <label for="aceito">Concordo com os Termos de Uso e Política de Privacidade.</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
        </form>
        
        <div class="auth-footer">
            <p>Já possui uma conta? <a href="{{ url_for('auth.login') }}">Fazer login</a></p>
        </div>
    </div>
</div>
{% endblock %}
