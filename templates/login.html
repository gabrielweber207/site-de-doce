{% extends "base.html" %}

{% block title %}Entrar{% endblock %}

{% block content %}
<div class="container container-xs">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <h2>Bem-vindo de volta!</h2>
            <p>Entre com sua conta para acessar seu carrinho e histórico.</p>
        </div>
        
        <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <div class="input-with-icon">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
                </div>
                <div class="form-links">
                    <a href="#" class="text-sm">Esqueceu a senha?</a>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Entrar <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
        </form>
        
        <div class="auth-footer">
            <p>Ainda não tem conta? <a href="{{ url_for('auth.cadastro') }}">Cadastre-se grátis</a></p>
        </div>
    </div>
</div>
{% endblock %}
